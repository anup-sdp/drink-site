<!-- issue: bs modal colse error message in console -->

<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>thecocktaildb api</title>
	<!-- bootstrap css -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
		rel="stylesheet"
		integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
		crossorigin="anonymous">
		<!-- custom  -->
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<nav class="navbar bg-body-secondary">
		<div class="container">
		  <a class="navbar-brand" href="#">
			thecocktaildb api
		  </a>
		</div>
	</nav>
	<div class="container mt-3">
		<div class="input-group mb-3">
			<input type="search" class="form-control" placeholder="search drinks..." aria-label="search" id="searchInput">
			<button class="btn btn-outline-primary" type="button" id="searchButton">search</button>
		</div>
	</div>
	<div id="app-container" class="container">
		<div class="row">
			<div class="col-md-9 col-12">
				<div class="row mb-3 p-2" id="searchResults">
					drink cards
				</div>
			</div>
			<div class="col-md-3 col-12 border"  id="group-dom">
				<p id="group-list-count">Group List: (0)</p>
				<hr>
				<div id="group-list">
				</div>
			</div>
		</div>
	</div>
	<!-- bs Modal -->
	<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel">
		<div class="modal-dialog">
			<div class="modal-content">
			<div class="modal-header">
				<h1 class="modal-title fs-5" id="exampleModalLabel">drink detail</h1>
			</div>
			<div class="modal-body" id="modal-body">
				<p>description</p>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-secondary" data-bs-target="#exampleModal" data-bs-dismiss="modal" aria-label="Close">close</button>
				<!-- <button type="button" class="btn btn-primary">Save changes</button> -->
			</div>
			</div>
		</div>
	</div>
	<!-- bootstrap js -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq"
		crossorigin="anonymous">
	</script>
	<script src="app.js"></script>
</body>
</html>
